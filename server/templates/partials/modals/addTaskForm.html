{{ define "addTaskForm" }}
	<div class="modal-content" id="add-task-form">
		<form
			hx-disabled-elt="
	      		find input[name='description'],
	        	find button[type='button'].btn-secondary,
	         	find button[type='submit']"
			hx-indicator="#ok-btn-icon"
			hx-post="/htmx/tasks"
			hx-target="#task-list"
			hx-disabled-elt=".htmx-disable"
		>
			<div class="modal-header position-relative">
				<h1 class="modal-title fs-5">Add task</h1>
				<button
					class="btn-close"
					type="button"
					data-bs-dismiss="modal"
				></button>
			</div>
			<div class="modal-body">
				<input
					class="form-control"
					type="text"
					name="description"
					placeholder="Enter task description"
					value="{{ .Description }}"
				/>
			</div>
			<div class="modal-footer">
				<button
					class="btn btn-secondary"
					type="button"
					data-bs-dismiss="modal"
				>
					<i class="bi bi-x-lg"></i>
					Cancel
				</button>
				<button class="btn btn-primary" type="submit">
					<i class="bi bi-check-lg" id="ok-btn-icon"></i>
					<div class="spinner-border spinner-border-sm"></div>
					Ok
				</button>
			</div>
		</form>
	</div>
{{ end }}
