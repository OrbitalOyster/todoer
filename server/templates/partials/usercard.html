{{ define "usercard" }}
	<div class="d-flex align-items-center gap-2">
		Hello, <strong>{{ .Payload.UserID }}</strong>
		<button
			class="btn btn-warning"
			type="button"
			hx-post="/logout"
			hx-trigger="confirmed"
			onclick="htmxConfirmMsg(this, 'Logging out', 'Are you sure?')"
		>
			<i class="bi bi-box-arrow-right" id="login-btn-icon"></i>
			Log out
		</button>
	</div>
{{ end }}
