<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- css -->
    <link href="/css/reset.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <!-- Funky Bootstrap -->
    <link rel="stylesheet" href="/vendor/flatly.min.css">
    <!-- Bootstrap icons -->
    <link rel="stylesheet" href="/vendor/bootstrap-icons.min.css">
    <!-- htmx -->
    <script defer src="/vendor/htmx.min.js"></script>
    <!-- Bootstrap js -->
    <script defer src="/vendor/bootstrap.bundle.min.js"></script>
    <!-- js -->
    <script defer src="/js/script.js"></script>
    <title>{{ .Title }}</title>
  </head>
  <body class="bg-primary bg-opacity-10">
    <!-- Firefox flashing layout voodoo hack -->
    <script>0</script>
    {{ template "confirmModal" }}
    {{ template "editTaskModal" }}

    <div class="fade modal modal-blur" id="htmxModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div id="htmxModalDialog" class="modal-content">
          <div class="modal-header position-relative placeholder-wave">
            <h1 class="modal-title fs-5 placeholder" id="modalTitle">Edit task</h1>
            <div class="position-absolute top-50 end-0 translate-middle me-2">
              <div id="spinner" class="spinner-border spinner-border-sm text-secondary">
              </div>
            </div>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" name="taskId" value="1"/>
            <input
              type="text"
              class="form-control placeholder"
              id="taskDescriptionInput"
              name="taskDescription"
              placeholder="Enter task description"
            >
            </input>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary placeholder" data-bs-dismiss="modal">
              Cancel
            </button>
            <button type="submit" class="btn btn-primary placeholder">
              Ok
            </button>
          </div>
        </div>
      </div>
    </div>

    {{ template "page" . }}
    <!-- Toasts -->
    <div
      class="
        toast-container
        position-fixed
        top-0
        end-0
        p-3
      "
    >
    </div>
  </body>
</html>
