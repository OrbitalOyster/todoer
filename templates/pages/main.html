{{ define "page" }}
<main class="col-xl-7 col-md-100 m-auto">
	<header class="align-items-center d-flex justify-content-between p-2">
		<h1>
			<a href="/">todoer</a>
		</h1>
		{{ template "usercard" . }}
	</header>
	<div class="card shadow-sm">
		<div class="card-header text-center">
			<h4>Tasks</h4>
		</div>
		<div class="card-body">
			{{ template "task-filters" . }}
			<hr />
			<table class="table table-striped">
				<thead>
					<tr>
						<th class="text-center align-middle">
							<input
								class="form-check-input"
								type="checkbox"
								value=""
							/>
						</th>
						<th class="text-center align-middle">#</th>
						<th class="text-center align-middle">What</th>
						<th class="text-center align-middle">When</th>
						<th class="text-center align-middle">Who</th>
						<th class="text-center align-middle">Done</th>
						<th class="text-center align-middle">Actions</th>
					</tr>
				</thead>
				<tbody class="table-group-divider" id="task-table-body">
					{{ template "task-table-body" .Tasks }}
				</tbody>
			</table>
			<!-- Pagination -->
			<div class="d-flex justify-content-center">
				<ul class="pagination">
					<li class="page-item">
						<a class="page-link" href="#">
							<i class="bi bi-chevron-left"></i>
						</a>
					</li>
					<li class="page-item">
						<a class="page-link" href="#">1</a>
					</li>
					<li class="page-item">
						<a class="page-link" href="#">2</a>
					</li>
					<li class="page-item">
						<a class="page-link" href="#">3</a>
					</li>
					<li class="page-item">
						<a class="page-link" href="#">
							<i class="bi bi-chevron-right"></i>
						</a>
					</li>
				</ul>
			</div>

		</div>
	</div>
</main>
{{ end }}
