{{ define "task-filters" }}
<div class="d-flex justify-content-between">
	<div class="d-flex gap-2 align-items-center">
		<label class="text-nowrap" for="task-list-size"> Page size: </label>
		<select
			class="form-select w-auto"
			id="task-list-size"
			name="size"
			hx-patch="/filters/page-size"
			hx-target="#task-list"
		>
			{{ range .PageSizes }}
			<option	{{ if eq $.Payload.PageSize . }} selected {{ end }}	value="{{ . }}">
				{{ . }}
			</option>
			{{ end }}
		</select>
		<!-- Search input -->
		<div class="input-group">
			<input
				class="form-control"
				name="searchBy"
				type="text"
				size="32"
				hx-patch="/filters/searchBy"
				hx-target="#task-list"
				hx-trigger="input changed delay:500ms, keyup[key=='Enter']"
				value="{{ .Payload.SearchBy }}"
			/>
			<i class="input-group-text bi bi-search"></i>
		</div>
		<!-- Dates -->
		<div class="d-flex align-items-center">
			<input
				class="form-control"
				type="date"
				name="fromDate"
				hx-patch="/filters/fromDate"
				hx-target="#task-list"
				value="{{ .Payload.FromDate }}"
			/>
			<i class="bi bi-slash-lg"></i>
			<input
				class="form-control"
				type="date"
				name="toDate"
				hx-patch="/filters/toDate"
				hx-target="#task-list"
				value="{{ .Payload.ToDate }}"
			/>
		</div>
	</div>
	<div
		class="d-flex justify-content-center align-items-center htmx-indicator"
		id="spinner"
	>
		<div class="spinner-border spinner-border-sm"></div>
	</div>
	<div class="d-flex gap-1">
		<!-- New task -->
		<button
			class="btn btn-primary"
			type="button"
			data-bs-toggle="tooltip"
			data-bs-placement="top"
			data-bs-trigger="hover"
			hx-get="/htmx/add-task"
			hx-indicator="#addTaskPlaceholder"
			hx-swap="beforeend"
			hx-target="#modal > div:first-child"
			onclick="showHTMXModal()"
			title="Add task"
		>
			<i class="bi bi-plus-lg fs-4"></i>
		</button>
		<!-- Refresh tasks -->
		<button
			class="btn btn-primary"
			type="button"
			data-bs-toggle="tooltip"
			data-bs-placement="top"
			data-bs-trigger="hover"
			title="Refresh tasks"
			hx-get="/htmx/tasks"
			hx-target="#task-table-body"
			hx-trigger="click"
			hx-indicator="#spinner"
		>
			<i class="bi bi-arrow-repeat fs-4"></i>
		</button>
	</div>
</div>
{{ end }}
