{{ define "task-filters" }}
<div class="d-flex justify-content-between">
	<div class="d-flex gap-2 align-items-center">
		<label class="text-nowrap" for="task-list-size"> Page size: </label>
		<select
			class="form-select w-auto"
			id="task-list-size"
			name="size"
			hx-patch="/filters/page-size"
			hx-target="#task-list"
		>
			{{ range .PageSizes }}
			<option	{{ if eq $.SelectedPageSize . }} selected {{ end }}	value="{{ . }}">
				{{ . }}
			</option>
			{{ end }}
		</select>
		<!-- Search input -->
		<div class="input-group">
			<input
				class="form-control"
				name="searchBy"
				type="text"
				size="32"
				hx-patch="/filters/searchBy"
				hx-target="#task-list"
				hx-trigger="input changed delay:500ms, keyup[key=='Enter']"
			/>
			<i class="input-group-text bi bi-search"></i>
		</div>
	</div>
	<div
		class="d-flex justify-content-center align-items-center htmx-indicator"
		id="spinner"
	>
		<div class="spinner-border spinner-border-sm"></div>
	</div>
	<button
		class="btn btn-primary"
		type="button"
		data-bs-toggle="tooltip"
		data-bs-placement="right"
		data-bs-trigger="hover"
		title="Refresh tasks"
		hx-get="/htmx/tasks"
		hx-target="#task-table-body"
		hx-trigger="click"
		hx-indicator="#spinner"
	>
		<i class="bi bi-arrow-repeat fs-5"></i>
	</button>
</div>
{{ end }}
