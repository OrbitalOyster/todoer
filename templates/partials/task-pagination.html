{{ define "pagination" }}
<div class="d-flex justify-content-between align-items-center">
	{{ if gt .TotalPages 1 }}
	<button
		class="btn btn-primary"
		hx-patch="/filters/previous-page"
		hx-target="#task-list"
		hx-indicator="#task-list"
	>
		<i class="bi bi-chevron-left"></i>
	</button>
	{{ end }}

	<ul class="pagination m-auto">
		{{ range .Pagination }} {{ if eq . 0 }}
		<i class="bi bi-three-dots fs-4 text-secondary"></i>
		{{ else }}
		<li class="page-item">
			<a
				class="page-link {{ if eq $.Payload.Page . }} active {{ end }}"
				hx-patch="/filters/page/{{ . }}"
				hx-target="#task-list"
				hx-indicator="#task-list"
				href="#"
			>
				{{ . }}
			</a>
		</li>
		{{ end }} {{ end }}
	</ul>
	{{ if gt .TotalPages 1 }}
	<button
		class="btn btn-primary"
		hx-patch="/filters/next-page"
		hx-target="#task-list"
		hx-indicator="#task-list"
	>
		<i class="bi bi-chevron-right"></i>
	</button>
	{{ end }}
</div>
{{ end }}
