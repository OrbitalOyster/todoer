{{ define "toast" }}
<div
  class="toast {{ .BorderClass }}"
  data-bs-autohide="{{ .Autohide }}"
  data-bs-delay="10000"
>
  <div class="toast-header {{ .HeaderColor }}">
    <i class="bi me-2 {{ .IconClass }} {{ .IconColor }}"></i>
    <strong class="me-auto">
      {{ .Title }}
    </strong>
    <small>
      {{ .Time }}
    </small>
    <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
  </div>
  {{ if eq .Autohide "true" }}
  <div style="height: 3px;">
    <div 
      class="progress-bar h-100 foo {{ .ProgressBarClass }}"
      style="width: 0%"
    >
    </div>
  </div>
  {{ end }}
  <div class="toast-body">
    {{ .Content }}
  </div>
</div>
{{ end }}
