{{ define "usercard" }}
<div class="d-flex align-items-center gap-2">
  Hello, <strong> {{ .Username }} </strong>
  <button
    class="btn btn-warning"
    type="button"
    hx-post="/api/logout"
    hx-trigger="confirmed"
    onclick="htmxConfirmMsg(this, 'Logging out', 'Are you sure?')"
  >
    Log out
  </button>
</div>
{{ end }}
